<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Etude - Lyric Puzzle</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Noto+Serif+KR:wght@300;400&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

body {
  background: #12101a;
  color: #f0ebdf;
  font-family: 'Noto Serif KR', serif;
  min-height: 100vh;
  overflow-x: hidden;
}

.page {
  max-width: 480px;
  margin: 0 auto;
  padding: 24px 16px 60px;
}

/* -- Header -- */
.eyebrow {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 11px;
  letter-spacing: .4em;
  color: #c4975a;
  text-transform: uppercase;
  text-align: center;
  margin-bottom: 4px;
  opacity: .7;
}
h1 {
  font-family: 'Cormorant Garamond', serif;
  font-weight: 300;
  font-size: 32px;
  text-align: center;
  margin-bottom: 24px;
  color: #f0ebdf;
  letter-spacing: -0.02em;
}

/* -- Image Section -- */
.image-card {
  position: relative;
  width: 100%;
  aspect-ratio: 3 / 4;
  background: #1a1726;
  border-radius: 4px;
  overflow: hidden;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  margin-bottom: 32px;
}
.main-image {
  width: 100%;
  height: 100%;
  background-size: cover;
  background-position: center;
}

/* 2x3 Grid Reveal */
.reveal-grid {
  position: absolute;
  inset: 0;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  grid-template-rows: repeat(2, 1fr);
  gap: 0;
  pointer-events: none;
}
.grid-block {
  background: #12101a;
  transition: opacity 0.8s ease, transform 0.8s ease;
  border: 0.2px solid #12101a;
}
.grid-block.revealed {
  opacity: 0;
  transform: scale(0.95);
}

/* -- Progress -- */
.progress-container {
  margin-bottom: 24px;
}
.progress-info {
  display: flex;
  justify-content: space-between;
  font-size: 12px;
  margin-bottom: 8px;
  color: #c4975a;
  font-family: 'Cormorant Garamond', serif;
  letter-spacing: 0.1em;
}
.progress-track {
  width: 100%;
  height: 2px;
  background: rgba(196, 151, 90, 0.2);
}
.progress-bar {
  width: 0%;
  height: 100%;
  background: #c4975a;
  transition: width 0.6s cubic-bezier(0.22, 1, 0.36, 1);
}

/* -- Game Play Area -- */
.tabs {
  display: flex;
  justify-content: center;
  gap: 8px;
  margin-bottom: 24px;
}
.tab-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: rgba(240, 235, 223, 0.2);
  transition: all 0.3s ease;
}
.tab-dot.active {
  background: #c4975a;
  transform: scale(1.3);
}
.tab-dot.completed {
  background: #d4849a;
}

.answer-area {
  min-height: 80px;
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  align-items: center;
  gap: 8px;
  margin-bottom: 32px;
  padding: 10px;
  border: 1px dashed rgba(196, 151, 90, 0.3);
  border-radius: 8px;
}
.slot {
  padding: 8px 16px;
  background: rgba(196, 151, 90, 0.1);
  border-bottom: 1px solid #c4975a;
  min-width: 40px;
  text-align: center;
  font-size: 16px;
  transition: all 0.3s ease;
  cursor: pointer;
}
.slot.correct { background: rgba(212, 132, 154, 0.2); border-color: #d4849a; }
.slot.wrong { animation: shake 0.4s; border-color: #ff4d4d; }

.source-area {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 10px;
  margin-bottom: 40px;
}
.word-btn {
  padding: 10px 18px;
  background: #1a1726;
  border: 1px solid rgba(196, 151, 90, 0.4);
  color: #f0ebdf;
  border-radius: 20px;
  font-size: 15px;
  cursor: pointer;
  transition: all 0.2s;
}
.word-btn:active { transform: scale(0.95); background: #c4975a; color: #12101a; }
.word-btn.used { opacity: 0.2; cursor: default; pointer-events: none; }

.controls {
  display: flex;
  gap: 12px;
}
.btn {
  flex: 1;
  padding: 16px;
  border: none;
  border-radius: 4px;
  font-family: 'Noto Serif KR', serif;
  font-size: 14px;
  cursor: pointer;
  transition: all 0.3s;
}
.btn-primary { background: #c4975a; color: #12101a; font-weight: bold; }
.btn-secondary { background: rgba(240, 235, 223, 0.1); color: #f0ebdf; }

/* -- Result Screen -- */
#screen-done {
  display: none;
  text-align: center;
}
#screen-done.visible {
  display: block;
  animation: fadeIn 1s;
}
.done-img {
  width: 100%;
  border-radius: 4px;
  margin-bottom: 24px;
}

/* -- Toast -- */
#toast {
  position: fixed;
  bottom: 10%;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.8);
  padding: 10px 20px;
  border-radius: 20px;
  font-size: 13px;
  opacity: 0;
  transition: opacity 0.3s;
  pointer-events: none;
  z-index: 1000;
}

@keyframes shake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-5) }
  75% { transform: translateX(5px); }
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

/* -- Canvas Background -- */
#canvas {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: -1;
  pointer-events: none;
}
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<div id="screen-game" class="page">
  <div class="eyebrow">Etude</div>
  <h1>Lyric Puzzle</h1>

  <div class="image-card">
    <div class="main-image" id="main-bg"></div>
    <div id="reveal-grid" class="reveal-grid">
      <div class="grid-block"></div>
      <div class="grid-block"></div>
      <div class="grid-block"></div>
      <div class="grid-block"></div>
      <div class="grid-block"></div>
      <div class="grid-block"></div>
    </div>
  </div>

  <div class="progress-container">
    <div class="progress-info">
      <span>PROGRESS</span>
      <span id="pct-text">0%</span>
    </div>
    <div class="progress-track">
      <div id="progress-bar" class="progress-bar"></div>
    </div>
  </div>

  <div class="tabs" id="tabs"></div>

  <div class="answer-area" id="answer-area"></div>
  <div class="source-area" id="source-area"></div>

  <div class="controls">
    <button class="btn btn-secondary" onclick="onReset()">초기화</button>
    <button class="btn btn-primary" onclick="onCheck()">확인</button>
  </div>
</div>

<div id="screen-done" class="page">
  <div class="eyebrow">Completed</div>
  <h1 id="final-title">Complete</h1>
  <img class="done-img" id="final-image" src="" alt="result">
  <button class="btn btn-primary" style="width:100%" onclick="location.reload()">다시 시작하기</button>
</div>

<div id="toast"></div>

<script>
/* -- Data -- */
var BG_IMAGES = [
  'https://i.imgur.com/DTWOMwW.jpg',
  'https://i.imgur.com/YQeZ08r.jpg',
  'https://i.imgur.com/EZD2S0a.jpg'
];
var SELECTED_BG = BG_IMAGES[Math.floor(Math.random() * BG_IMAGES.length)];

var LINES = [
  { label: "Part 1", words: ["Il", "la", "voyait", "sans", "un", "mot"] },
  { label: "Part 2", words: ["Un", "éclat", "pur", "dans", "ses", "yeux", "clos"] },
  { label: "Part 3", words: ["Si", "fragile,", "si", "belle,", "si", "loin"] },
  { label: "Part 4", words: ["Elle", "brillait", "sans", "dire", "un", "mot"] },
  { label: "Part 5", words: ["Dans", "ses", "yeux,", "un", "monde", "trop", "beau"] },
  { label: "Part 6", words: ["Si", "fragile,", "si", "douce,", "si", "loin"] }
];

/* -- State -- */
var state = {
  currentLine: 0,
  placedWords: [],
  shuffledWords: [],
  completedLines: {},
  revealOrder: [0, 1, 2, 3, 4, 5], // 기본값 추가
};

/* -- Init -- */
function init() {
  // 배경 적용
  document.getElementById('main-bg').style.backgroundImage = 'url(' + SELECTED_BG + ')';
  document.getElementById('final-image').src = SELECTED_BG;
  state.revealOrder = shuffle([0, 1, 2, 3, 4, 5]);
  
  initTabs();
  loadLine(0);
  initParticles();
}

function initTabs() {
  var container = document.getElementById('tabs');
  container.innerHTML = '';
  LINES.forEach(function(_, i) {
    var dot = document.createElement('div');
    dot.className = 'tab-dot';
    dot.id = 'tab-' + i;
    container.appendChild(dot);
  });
}

function loadLine(idx) {
  state.currentLine = idx;
  state.placedWords = [];
  
  // 셔플
  var origin = LINES[idx].words.slice();
  state.shuffledWords = shuffle(origin);
  
  updateTabs();
  renderAnswerArea();
  renderSourceArea();
}

function shuffle(array) {
  var currentIndex = array.length, temporaryValue, randomIndex;
  while (0 !== currentIndex) {
    randomIndex = Math.floor(Math.random() * currentIndex);
    currentIndex -= 1;
    temporaryValue = array[currentIndex];
    array[currentIndex] = array[randomIndex];
    array[randomIndex] = temporaryValue;
  }
  return array;
}

/* -- Rendering -- */
function updateTabs() {
  LINES.forEach(function(_, i) {
    var dot = document.getElementById('tab-' + i);
    dot.className = 'tab-dot';
    if (i === state.currentLine) dot.classList.add('active');
    if (state.completedLines[i]) dot.classList.add('completed');
  });
}

function renderAnswerArea() {
  var area = document.getElementById('answer-area');
  area.innerHTML = '';
  var targetLen = LINES[state.currentLine].words.length;
  
  for (var i = 0; i < targetLen; i++) {
    var slot = document.createElement('div');
    slot.className = 'slot';
    if (state.placedWords[i]) {
      slot.textContent = state.placedWords[i];
      slot.onclick = (function(idx) {
        return function() { removeWord(idx); };
      })(i);
    }
    area.appendChild(slot);
  }
}

function renderSourceArea() {
  var area = document.getElementById('source-area');
  area.innerHTML = '';
  
  var correctWords = LINES[state.currentLine].words;
  var counts = {};
  state.placedWords.forEach(function(w) { counts[w] = (counts[w] || 0) + 1; });

  state.shuffledWords.forEach(function(word) {
    var btn = document.createElement('button');
    btn.className = 'word-btn';
    btn.textContent = word;
    
    var total = correctWords.filter(function(w){ return w === word }).length;
    var used = counts[word] || 0;
    if (used >= total) btn.classList.add('used');
    
    btn.onclick = function() { placeWord(word); };
    area.appendChild(btn);
  });
}

/* -- Actions -- */
function placeWord(word) {
  if (state.placedWords.length >= LINES[state.currentLine].words.length) return;
  state.placedWords.push(word);
  renderAnswerArea();
  renderSourceArea();
}

function removeWord(idx) {
  state.placedWords.splice(idx, 1);
  renderAnswerArea();
  renderSourceArea();
}

function onCheck() {
  var correct = LINES[state.currentLine].words;
  var placed = state.placedWords;
  
  if (placed.length < correct.length) {
    showToast('모든 단어를 배치해 주세요');
    return;
  }
  
  var isMatch = placed.every(function(w, i) { return w === correct[i]; });
  
  if (isMatch) {
    state.completedLines[state.currentLine] = true;
    updateProgress();
    spawnConfetti();
    showToast('정답입니다');
    
    setTimeout(function() {
      var doneCount = Object.keys(state.completedLines).length;
      if (doneCount >= LINES.length) {
        showComplete();
      } else {
        var next = (state.currentLine + 1) % LINES.length;
        while (state.completedLines[next]) {
          next = (next + 1) % LINES.length;
        }
        loadLine(next);
      }
    }, 1000);
  } else {
    var slots = document.querySelectorAll('.slot');
    slots.forEach(function(s) {
      s.classList.add('wrong');
      setTimeout(function(){ s.classList.remove('wrong'); }, 400);
    });
    showToast('순서가 틀렸습니다');
  }
}

function onReset() {
  state.placedWords = [];
  renderAnswerArea();
  renderSourceArea();
}

function updateProgress() {
  var n = Object.keys(state.completedLines).length;
  var pct = Math.round((n / LINES.length) * 100);
  document.getElementById('pct-text').textContent = pct + '%';
  document.getElementById('progress-bar').style.width = pct + '%';
  
  // Grid Reveal
  var blocks = document.querySelectorAll('.grid-block');
  blocks.forEach(function(b) { b.classList.remove('revealed'); });
  
  for (var i = 0; i < n; i++) {
    var targetIndex = state.revealOrder[i];
    if (blocks[targetIndex]) {
      blocks[targetIndex].classList.add('revealed');
    }
  }
}

function showComplete() {
  document.getElementById('final-image').src = SELECTED_BG;
  document.getElementById('screen-game').style.display = 'none';
  document.getElementById('screen-done').classList.add('visible');
  spawnBigConfetti();
}

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.style.opacity = 1;
  setTimeout(function() { t.style.opacity = 0; }, 2000);
}

/* -- Particles -- */
var canvas, ctx, W, H;
var particles = [];

function initParticles() {
  canvas = document.getElementById('canvas');
  ctx = canvas.getContext('2d');
  window.addEventListener('resize', resize);
  resize();
  
  for(var i=0; i<30; i++) {
    particles.push(createParticle(true));
  }
  requestAnimationFrame(tick);
}

function resize() {
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W;
  canvas.height = H;
}

function createParticle(ambient) {
  return {
    x: Math.random() * W,
    y: ambient ? Math.random() * H : H + 10,
    r: Math.random() * 3 + 1,
    vx: (Math.random() - 0.5) * 1,
    vy: ambient ? (Math.random() * 0.5 + 0.2) * -1 : (Math.random() * 3 + 2) * -1,
    color: '#c4975a',
    opacity: Math.random() * 0.5 + 0.2,
    ambient: ambient
  };
}

function spawnConfetti() {
  for(var i=0; i<20; i++) {
    var p = createParticle(false);
    p.x = Math.random() * W;
    p.color = ['#c4975a', '#d4849a', '#f0ebdf'][Math.floor(Math.random()*3)];
    particles.push(p);
  }
}

function spawnBigConfetti() {
  var count = 0;
  var timer = setInterval(function() {
    spawnConfetti();
    if(count++ > 10) clearInterval(timer);
  }, 200);
}

function tick() {
  ctx.clearRect(0, 0, W, H);
  particles.forEach(function(p, i) {
    p.x += p.vx;
    p.y += p.vy;
    ctx.beginPath();
    ctx.fillStyle = p.color;
    ctx.globalAlpha = p.opacity;
    ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
    ctx.fill();
    
    if(p.y < -10) {
      if(p.ambient) {
        p.y = H + 10;
        p.x = Math.random() * W;
      } else {
        particles.splice(i, 1);
      }
    }
  });
  requestAnimationFrame(tick);
}

window.onload = init;
</script>
</body>
</html>
