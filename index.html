<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Etude — Lyric Puzzle</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Noto+Serif+KR:wght@300;400&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

body {
  background: #12101a;
  color: #f0ebdf;
  font-family: 'Noto Serif KR', serif;
  min-height: 100vh;
  overflow-x: hidden;
}

.page {
  max-width: 480px;
  margin: 0 auto;
  padding: 24px 16px 60px;
}

/* ── 헤더 ── */
.eyebrow {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 11px;
  letter-spacing: .4em;
  color: #c4975a;
  text-transform: uppercase;
  text-align: center;
  margin-bottom: 4px;
  opacity: .7;
}
h1 {
  font-family: 'Cormorant Garamond', serif;
  font-weight: 300;
  font-size: 44px;
  letter-spacing: .08em;
  text-align: center;
  line-height: 1;
  color: #f0ebdf;
}
h1 em { color: #d4849a; font-style: italic; }
.sub {
  font-size: 11px;
  color: rgba(240,235,223,.35);
  letter-spacing: .18em;
  text-align: center;
  margin-top: 6px;
  margin-bottom: 22px;
}

/* ── 게이지 ── */
.progress-section { margin-bottom: 20px; }
.progress-header {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 6px;
}
.progress-label {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 12px;
  letter-spacing: .2em;
  color: #c4975a;
}
.progress-pct {
  font-family: 'Cormorant Garamond', serif;
  font-size: 22px;
  font-weight: 300;
}
.progress-track {
  width: 100%;
  height: 3px;
  background: rgba(240,235,223,.1);
  border-radius: 2px;
}
.progress-bar {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, #5a4d7a, #d4849a, #c4975a);
  border-radius: 2px;
  transition: width 0.8s ease;
}

/* ── 라인 탭 ── */
.section-label {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 11px;
  letter-spacing: .25em;
  color: rgba(240,235,223,.3);
  text-transform: uppercase;
  margin-bottom: 8px;
}
.tabs {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 16px;
}
.tab-btn {
  padding: 6px 14px;
  border-radius: 20px;
  border: 1px solid rgba(240,235,223,.2);
  background: transparent;
  color: rgba(240,235,223,.45);
  font-family: 'Cormorant Garamond', serif;
  font-size: 13px;
  letter-spacing: .08em;
  cursor: pointer;
  transition: all .2s;
}
.tab-btn.active {
  background: rgba(90,77,122,.55);
  border-color: #7a6aa0;
  color: #f0ebdf;
}
.tab-btn.done {
  background: rgba(196,151,90,.22);
  border-color: #c4975a;
  color: #c4975a;
}

/* ── 게임 박스 ── */
.game-box {
  background: rgba(255,255,255,.03);
  border: 1px solid rgba(255,255,255,.08);
  border-radius: 12px;
  padding: 16px;
  margin-bottom: 16px;
}

.line-title {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 13px;
  color: rgba(240,235,223,.45);
  letter-spacing: .12em;
  margin-bottom: 12px;
}

/* 답 슬롯 영역 */
.answer-area {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  min-height: 50px;
  margin-bottom: 14px;
  align-content: flex-start;
}

.slot {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 7px 13px;
  border-radius: 20px;
  font-family: 'Cormorant Garamond', serif;
  font-size: 14px;
  letter-spacing: .05em;
  background: rgba(196,151,90,.18);
  border: 1px solid rgba(196,151,90,.45);
  color: #f0ebdf;
  cursor: pointer;
  transition: all .15s;
  user-select: none;
}
.slot:active { transform: scale(.94); }
.slot .num {
  font-size: 9px;
  opacity: .4;
  margin-right: 2px;
}
.slot.correct {
  background: rgba(196,151,90,.4);
  border-color: #c4975a;
  animation: pop .35s ease;
}
.slot.wrong {
  animation: shake .3s ease;
}

.empty-hint {
  font-family: 'Cormorant Garamond', serif;
  font-size: 12px;
  color: rgba(240,235,223,.2);
  letter-spacing: .15em;
  font-style: italic;
  padding: 8px 0;
}

@keyframes pop {
  0%   { transform: scale(1); }
  50%  { transform: scale(1.1); }
  100% { transform: scale(1); }
}
@keyframes shake {
  0%,100% { transform: translateX(0); }
  25%     { transform: translateX(-6px); }
  75%     { transform: translateX(6px); }
}

/* 구분선 */
.divider {
  border: none;
  border-top: 1px solid rgba(240,235,223,.07);
  margin: 0 0 12px;
}

.src-hint {
  font-family: 'Cormorant Garamond', serif;
  font-size: 11px;
  color: rgba(240,235,223,.28);
  letter-spacing: .18em;
  font-style: italic;
  margin-bottom: 10px;
}

/* 소스 단어 영역 */
.source-area {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

.word-btn {
  display: inline-flex;
  align-items: center;
  padding: 8px 16px;
  border-radius: 24px;
  border: 1px solid rgba(122,106,160,.55);
  background: rgba(90,77,122,.3);
  color: #f0ebdf;
  font-family: 'Cormorant Garamond', serif;
  font-size: 14px;
  letter-spacing: .05em;
  cursor: pointer;
  transition: all .18s;
  user-select: none;
}
.word-btn:active {
  transform: scale(.93);
  background: rgba(90,77,122,.6);
}
.word-btn.used {
  opacity: .2;
  pointer-events: none;
  cursor: default;
}

/* ── 버튼 ── */
.btn-row {
  display: flex;
  gap: 10px;
  margin-top: 14px;
}
.btn {
  flex: 1;
  padding: 14px;
  border: none;
  border-radius: 8px;
  font-family: 'Noto Serif KR', serif;
  font-size: 14px;
  letter-spacing: .08em;
  cursor: pointer;
  transition: all .18s;
}
.btn-check {
  background: #5a4d7a;
  color: #f0ebdf;
}
.btn-check:active { background: #7a6aa0; transform: scale(.98); }
.btn-reset {
  background: rgba(240,235,223,.07);
  color: rgba(240,235,223,.5);
  border: 1px solid rgba(240,235,223,.12);
}
.btn-reset:active { background: rgba(240,235,223,.13); transform: scale(.98); }

/* ── 이미지 (맨 아래) ── */
.puzzle-section {
  margin-top: 8px;
}
.puzzle-wrap {
  position: relative;
  width: 100%;
  max-width: 340px;
  margin: 0 auto;
  border-radius: 8px;
  overflow: hidden;
  box-shadow: 0 8px 40px rgba(0,0,0,.55);
}
.puzzle-wrap img {
  width: 100%;
  display: block;
}
#img-complete {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  opacity: 0;
  transition: opacity 1.2s ease;
}
.reveal-overlay {
  position: absolute;
  inset: 0;
  background: #12101a;
  transition: opacity 0.9s ease;
  pointer-events: none;
}

/* ── 완성 화면 ── */
#screen-done {
  display: none;
  text-align: center;
  padding: 20px 0;
}
#screen-done.visible { display: block; }
.done-img {
  width: 100%;
  max-width: 300px;
  border-radius: 8px;
  margin: 0 auto 20px;
  display: block;
  box-shadow: 0 20px 60px rgba(0,0,0,.6);
}
.done-title {
  font-family: 'Cormorant Garamond', serif;
  font-weight: 300;
  font-style: italic;
  font-size: 36px;
  color: #c4975a;
  margin-bottom: 10px;
}
.done-desc {
  font-size: 12px;
  color: rgba(240,235,223,.4);
  line-height: 2;
  letter-spacing: .05em;
  margin-bottom: 24px;
}
.btn-replay {
  padding: 12px 28px;
  border-radius: 30px;
  border: 1px solid #7a6aa0;
  background: transparent;
  color: #f0ebdf;
  font-family: 'Cormorant Garamond', serif;
  font-size: 14px;
  letter-spacing: .15em;
  cursor: pointer;
  transition: all .2s;
}
.btn-replay:active { background: rgba(90,77,122,.4); }

/* ── 토스트 ── */
#toast {
  position: fixed;
  bottom: 28px;
  left: 50%;
  transform: translateX(-50%) translateY(16px);
  background: rgba(18,16,26,.97);
  border: 1px solid rgba(196,151,90,.5);
  color: #f0ebdf;
  padding: 10px 22px;
  border-radius: 30px;
  font-size: 13px;
  letter-spacing: .06em;
  opacity: 0;
  transition: opacity .3s, transform .3s;
  pointer-events: none;
  white-space: nowrap;
  z-index: 9999;
}
#toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* 파티클 캔버스 */
#particle-canvas {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
}
.page { position: relative; z-index: 1; }
</style>
</head>

document.getElementById('btn-reset').addEventListener('click', onReset);
document.getElementById('btn-replay').addEventListener('click', onReplay);

/* ── 탭 초기화 ── */
function initTabs() {
  var container = document.getElementById('tabs-container');
  container.innerHTML = '';
  LINES.forEach(function(line, i) {
    var btn = document.createElement('button');
    btn.className = 'tab-btn';
    btn.textContent = line.label;
    btn.setAttribute('data-index', i);
    btn.addEventListener('click', function() {
      loadLine(i);
    });
    container.appendChild(btn);
  });
  updateTabs();
}

function updateTabs() {
  var buttons = document.querySelectorAll('.tab-btn');
  buttons.forEach(function(btn) {
    var i = parseInt(btn.getAttribute('data-index'));
    btn.className = 'tab-btn';
    if (i === state.currentLine) btn.classList.add('active');
    if (state.completedLines[i])  btn.classList.add('done');
  });
}

/* ── 라인 로드 ── */
function loadLine(index) {
  state.currentLine = index;
  state.placedWords = [];
  // 셔플은 여기서 딱 한 번만
  state.shuffledWords = shuffleArray(LINES[index].words.slice());

  document.getElementById('line-title').textContent =
    LINES[index].label + ' — 순서대로 배치하세요';

  updateTabs();
  renderAnswerArea();
  renderSourceArea();
}

/* ── 답 영역 렌더 ── */
function renderAnswerArea() {
  var area = document.getElementById('answer-area');
  area.innerHTML = '';

  if (state.placedWords.length === 0) {
    var hint = document.createElement('span');
    hint.className = 'empty-hint';
    hint.textContent = '단어를 탭하면 여기에 쌓여요';
    area.appendChild(hint);
    return;
  }

  state.placedWords.forEach(function(word, i) {
    var slot = document.createElement('div');
    slot.className = 'slot';
    slot.innerHTML = '<span class="num">' + (i + 1) + '.</span>' + word;
    // 탭하면 제거
    slot.addEventListener('click', function() {
      state.placedWords.splice(i, 1);
      renderAnswerArea();
      renderSourceArea();
    });
    area.appendChild(slot);
  });
}

/* ── 소스 영역 렌더 ── */
function renderSourceArea() {
  var area = document.getElementById('source-area');
  area.innerHTML = '';

  var correctWords = LINES[state.currentLine].words;

  // 이미 배치한 단어 카운트
  var placedCount = {};
  state.placedWords.forEach(function(w) {
    placedCount[w] = (placedCount[w] || 0) + 1;
  });

  state.shuffledWords.forEach(function(word) {
    var btn = document.createElement('button');
    btn.className = 'word-btn';
    btn.textContent = word;

    // 이 단어가 총 몇 번 나오는지 vs 얼마나 배치됐는지
    var totalCount  = correctWords.filter(function(w) { return w === word; }).length;
    var usedCount   = placedCount[word] || 0;
    if (usedCount >= totalCount) {
      btn.classList.add('used');
    }

    btn.addEventListener('click', function() {
      if (btn.classList.contains('used')) return;
      placeWord(word);
    });

    area.appendChild(btn);
  });
}

/* ── 단어 배치 ── */
function placeWord(word) {
  var maxLen = LINES[state.currentLine].words.length;
  if (state.placedWords.length >= maxLen) return;

  state.placedWords.push(word);
  renderAnswerArea();
  renderSourceArea();
  spawnBurst();
}

/* ── 확인 버튼 ── */
function onCheck() {
  var correct = LINES[state.currentLine].words;
  var placed  = state.placedWords;

  if (placed.length === 0) {
    showToast('단어를 탭해서 배치해보세요');
    return;
  }
  if (placed.length < correct.length) {
    showToast('아직 ' + (correct.length - placed.length) + '개 더 필요해요');
    return;
  }

  // 정답 비교
  var isCorrect = placed.every(function(w, i) { return w === correct[i]; });

  if (isCorrect) {
    // 슬롯 정답 애니메이션
    var slots = document.querySelectorAll('#answer-area .slot');
    slots.forEach(function(slot, i) {
      setTimeout(function() {
        slot.classList.add('correct');
      }, i * 70);
    });

    state.completedLines[state.currentLine] = true;
    updateTabs();
    updateProgress();
    spawnConfetti();
    showToast('✓ 정답!');

    // 1.4초 후 다음 라인으로
    setTimeout(function() {
      var totalDone = Object.keys(state.completedLines).length;
      if (totalDone >= LINES.length) {
        showComplete();
        return;
      }
      // 다음 안 푼 라인 찾기
      var next = state.currentLine;
      for (var i = 0; i < LINES.length; i++) {
        next = (next + 1) % LINES.length;
        if (!state.completedLines[next]) break;
      }
      loadLine(next);
    }, 1400);

  } else {
    // 틀림 애니메이션
    var slots = document.querySelectorAll('#answer-area .slot');
    slots.forEach(function(slot) {
      slot.classList.add('wrong');
      setTimeout(function() { slot.classList.remove('wrong'); }, 400);
    });

    // 몇 번째가 틀렸는지
    var wrongIdx = -1;
    for (var i = 0; i < placed.length; i++) {
      if (placed[i] !== correct[i]) { wrongIdx = i; break; }
    }
    if (wrongIdx >= 0) {
      showToast((wrongIdx + 1) + '번째 단어가 틀렸어요');
    } else {
      showToast('순서가 맞지 않아요');
    }
  }
}

/* ── 초기화 버튼 ── */
function onReset() {
  state.placedWords = [];
  renderAnswerArea();
  renderSourceArea();
}

/* ── 진행도 업데이트 ── */
function updateProgress() {
  var n   = Object.keys(state.completedLines).length;
  var pct = Math.round(n / LINES.length * 100);

  document.getElementById('pct-text').textContent  = pct + '%';
  document.getElementById('progress-bar').style.width = pct + '%';

  // 이미지 reveal
  var opacity = 1 - (pct / 100) * 0.97;
  document.getElementById('reveal-overlay').style.opacity = opacity;
  if (pct >= 100) {
    document.getElementById('img-complete').style.opacity = 1;
  }
}

/* ── 완성 화면 ── */
function showComplete() {
  document.getElementById('screen-game').style.display = 'none';
  document.getElementById('screen-done').classList.add('visible');
  spawnBigConfetti();
}

function onReplay() {
  state.currentLine    = 0;
  state.placedWords    = [];
  state.shuffledWords  = [];
  state.completedLines = {};

  document.getElementById('screen-game').style.display = '';
  document.getElementById('screen-done').classList.remove('visible');

  document.getElementById('pct-text').textContent      = '0%';
  document.getElementById('progress-bar').style.width  = '0%';
  document.getElementById('reveal-overlay').style.opacity = 1;
  document.getElementById('img-complete').style.opacity   = 0;

  initTabs();
  loadLine(0);
}

/* ── 토스트 ── */
var toastTimer = null;
function showToast(msg) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function() {
    el.classList.remove('show');
  }, 2500);
}

/* ── 배열 셔플 ── */
function shuffleArray(arr) {
  for (var i = arr.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = arr[i]; arr[i] = arr[j]; arr[j] = tmp;
  }
  return arr;
}

/* ── 파티클 ── */
var canvas = document.getElementById('particle-canvas');
var ctx    = canvas.getContext('2d');
var W, H;
var particles = [];

function initParticles() {
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);
  for (var i = 0; i < 15; i++) addAmbient();
  requestAnimationFrame(tickParticles);
}

function resizeCanvas() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
}

function addAmbient() {
  particles.push({
    x: Math.random() * W,
    y: Math.random() * H + H * 0.3,
    r: Math.random() * 1.2 + 0.3,
    vx: (Math.random() - 0.5) * 0.2,
    vy: -(Math.random() * 0.3 + 0.08),
    alpha: Math.random() * 0.25 + 0.05,
    color: ['#c4975a','#d4849a','#5a4d7a'][Math.floor(Math.random() * 3)],
    ambient: true,
    life: 1
  });
}

function spawnBurst() {
  var x = W / 2, y = H * 0.5;
  for (var i = 0; i < 10; i++) {
    var angle = Math.PI * 2 / 10 * i;
    var speed = Math.random() * 3 + 1;
    particles.push({
      x: x, y: y,
      r: Math.random() * 3 + 1,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 1.5,
      alpha: 1,
      color: ['#c4975a','#d4849a','#f0ebdf'][Math.floor(Math.random() * 3)],
      ambient: false,
      life: 1,
      decay: 0.04
    });
  }
}

function spawnConfetti() {
  for (var i = 0; i < 40; i++) {
    particles.push({
      x: Math.random() * W,
      y: -10,
      r: Math.random() * 4 + 2,
      vx: (Math.random() - 0.5) * 6,
      vy: Math.random() * 3 + 2,
      alpha: 1,
      color: ['#c4975a','#d4849a','#5a4d7a','#f0ebdf'][Math.floor(Math.random() * 4)],
      ambient: false,
      life: 1,
      decay: 0.012,
      rot: Math.random() * Math.PI * 2,
      rotSpeed: (Math.random() - 0.5) * 0.18
    });
  }
}

function spawnBigConfetti() {
  for (var i = 0; i < 8; i++) {
    setTimeout(spawnConfetti, i * 200);
  }
}

function tickParticles() {
  ctx.clearRect(0, 0, W, H);

  particles = particles.filter(function(p) { return p.life > 0.02; });

  particles.forEach(function(p) {
    ctx.save();
    ctx.globalAlpha = p.ambient ? p.alpha : p.alpha * p.life;
    ctx.fillStyle = p.color;

    if (p.rot !== undefined) {
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot);
      ctx.fillRect(-p.r, -p.r * 0.5, p.r * 2, p.r);
    } else {
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();

    p.x += p.vx;
    p.y += p.vy;
    if (p.rot !== undefined) p.rot += p.rotSpeed;
    if (!p.ambient) p.life -= p.decay;

    // ambient 순환
    if (p.ambient) {
      if (p.y < -20) { p.y = H + 20; p.x = Math.random() * W; }
      if (p.x < 0)  p.x = W;
      if (p.x > W)  p.x = 0;
    }
  });

  // ambient 수 유지
  var ambientCount = particles.filter(function(p) { return p.ambient; }).length;
  if (ambientCount < 10) addAmbient();

  requestAnimationFrame(tickParticles);
}
</script>
