<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Etude — Lyric Puzzle</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Noto+Serif+KR:wght@300;400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:#12101a;color:#f0ebdf;font-family:"Noto Serif KR",serif;min-height:100vh}
#particle-canvas{position:fixed;inset:0;pointer-events:none;z-index:0}
.page{position:relative;z-index:1;max-width:480px;margin:0 auto;padding:24px 16px 60px}
.eyebrow{font-family:"Cormorant Garamond",serif;font-style:italic;font-size:11px;letter-spacing:.4em;color:#c4975a;text-transform:uppercase;text-align:center;margin-bottom:4px;opacity:.7}
h1{font-family:"Cormorant Garamond",serif;font-weight:300;font-size:44px;letter-spacing:.08em;text-align:center;line-height:1;color:#f0ebdf}
h1 em{color:#d4849a;font-style:italic}
.sub{font-size:11px;color:rgba(240,235,223,.35);letter-spacing:.18em;text-align:center;margin-top:6px;margin-bottom:22px}
.prog-wrap{margin-bottom:20px}
.prog-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px}
.prog-label{font-family:"Cormorant Garamond",serif;font-style:italic;font-size:12px;letter-spacing:.2em;color:#c4975a}
.prog-pct{font-family:"Cormorant Garamond",serif;font-size:22px;font-weight:300}
.prog-track{width:100%;height:3px;background:rgba(240,235,223,.1);border-radius:2px}
.prog-bar{height:100%;width:0%;background:linear-gradient(90deg,#5a4d7a,#d4849a,#c4975a);border-radius:2px;transition:width .8s ease}
.sec-label{font-family:"Cormorant Garamond",serif;font-style:italic;font-size:11px;letter-spacing:.25em;color:rgba(240,235,223,.3);text-transform:uppercase;margin-bottom:8px}
.tabs{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px}
.tab{padding:6px 14px;border-radius:20px;border:1px solid rgba(240,235,223,.2);background:transparent;color:rgba(240,235,223,.45);font-family:"Cormorant Garamond",serif;font-size:13px;cursor:pointer;transition:all .2s}
.tab.active{background:rgba(90,77,122,.55);border-color:#7a6aa0;color:#f0ebdf}
.tab.done{background:rgba(196,151,90,.22);border-color:#c4975a;color:#c4975a}
.game-box{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:16px;margin-bottom:16px}
.line-title{font-family:"Cormorant Garamond",serif;font-style:italic;font-size:13px;color:rgba(240,235,223,.45);letter-spacing:.12em;margin-bottom:12px}
.answer-area{display:flex;flex-wrap:wrap;gap:6px;min-height:50px;margin-bottom:14px;align-content:flex-start}
.slot{display:inline-flex;align-items:center;gap:4px;padding:7px 13px;border-radius:20px;font-family:"Cormorant Garamond",serif;font-size:14px;background:rgba(196,151,90,.18);border:1px solid rgba(196,151,90,.45);color:#f0ebdf;cursor:pointer;user-select:none;transition:all .15s}
.slot:active{transform:scale(.94)}
.slot .n{font-size:9px;opacity:.4}
.slot.correct{background:rgba(100,200,100,.3)!important;border-color:#6cc!important;animation:pop .35s ease}
.slot.wrong{animation:shake .3s ease;background:rgba(220,80,80,.3)!important;border-color:#e66!important}
.empty-hint{font-family:"Cormorant Garamond",serif;font-size:12px;color:rgba(240,235,223,.2);font-style:italic;padding:8px 0}
@keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.1)}100%{transform:scale(1)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.divider{border:none;border-top:1px solid rgba(240,235,223,.07);margin:0 0 12px}
.src-hint{font-size:11px;color:rgba(240,235,223,.28);font-family:"Cormorant Garamond",serif;font-style:italic;margin-bottom:10px;letter-spacing:.15em}
.source-area{display:flex;flex-wrap:wrap;gap:8px}
.word-btn{padding:8px 16px;border-radius:24px;border:1px solid rgba(122,106,160,.55);background:rgba(90,77,122,.3);color:#f0ebdf;font-family:"Cormorant Garamond",serif;font-size:14px;cursor:pointer;transition:all .18s;user-select:none}
.word-btn:active{transform:scale(.93);background:rgba(90,77,122,.6)}
.word-btn.used{opacity:.2;pointer-events:none}
.btn-row{display:flex;gap:10px;margin-top:14px}
.btn{flex:1;padding:14px;border:none;border-radius:8px;font-family:"Noto Serif KR",serif;font-size:14px;letter-spacing:.08em;cursor:pointer;transition:all .18s}
.btn-check{background:#5a4d7a;color:#f0ebdf}
.btn-check:active{background:#7a6aa0;transform:scale(.98)}
.btn-reset{background:rgba(240,235,223,.07);color:rgba(240,235,223,.5);border:1px solid rgba(240,235,223,.12)}
.btn-reset:active{transform:scale(.98)}
.puzzle-section{margin-top:8px;display:flex;justify-content:center}
#puzzle-canvas{border-radius:8px;box-shadow:0 8px 40px rgba(0,0,0,.55);max-width:100%;display:block}
#screen-done{display:none;text-align:center;padding:20px 0}
#screen-done.visible{display:block}
.done-title{font-family:"Cormorant Garamond",serif;font-weight:300;font-style:italic;font-size:36px;color:#c4975a;margin-bottom:10px}
.done-desc{font-size:12px;color:rgba(240,235,223,.4);line-height:2;letter-spacing:.05em;margin-bottom:24px}
.btn-replay{padding:12px 28px;border-radius:30px;border:1px solid #7a6aa0;background:transparent;color:#f0ebdf;font-family:"Cormorant Garamond",serif;font-size:14px;letter-spacing:.15em;cursor:pointer}
#toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(16px);background:rgba(18,16,26,.97);border:1px solid rgba(196,151,90,.5);color:#f0ebdf;padding:10px 22px;border-radius:30px;font-size:13px;opacity:0;transition:opacity .3s,transform .3s;pointer-events:none;white-space:nowrap;z-index:9999}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>

  <div class="sec-label">라인 선택</div>
  <div class="tabs" id="tabs"></div>
  <div class="game-box">
    <div class="line-title" id="line-title">라인을 선택하세요</div>
    <div class="answer-area" id="answer-area"></div>
    <hr class="divider">
    <div class="src-hint">단어 탭 → 위에 쌓임 &nbsp;|&nbsp; 쌓인 단어 탭 → 제거</div>
    <div class="source-area" id="source-area"></div>
    <div class="btn-row">
      <button class="btn btn-check" onclick="onCheck()">확인 ✓</button>
      <button class="btn btn-reset" onclick="onReset()">초기화</button>
    </div>
  </div>
  <div class="puzzle-section">
    <canvas id="puzzle-canvas"></canvas>
  </div>
</div>

<div id="screen-done">
  <div class="page">
    <canvas id="done-canvas" style="max-width:300px;width:100%;border-radius:8px;display:block;margin:0 auto 20px;box-shadow:0 20px 60px rgba(0,0,0,.6)"></canvas>
    <div class="done-title">Complété ✦</div>
    <div class="done-desc">모든 가사를 완성했어요.<br>말하지 않아도<br>눈빛으로 전해지는 것들이 있으니까요.</div>
    <button class="btn-replay" onclick="onReplay()">처음부터 다시</button>
  </div>
</div>

<div id="toast"></div>

<script>
// ================================================================
// ✏️ 수정하려면 여기만 바꾸세요
// ================================================================
var LINES = [
  { label:"Couplet 1", words:["Il","la","voyait","sans","un","mot"] },
  { label:"Suite 1",   words:["Un","\u00e9clat","pur","dans","ses","yeux","clos"] },
  { label:"Couplet 2", words:["Si","fragile,","si","belle,","si","loin"] },
  { label:"Suite 2",   words:["Elle","brillait","sans","dire","un","mot"] },
  { label:"Couplet 3", words:["Dans","ses","yeux,","un","monde","trop","beau"] },
  { label:"Final",     words:["Si","fragile,","si","douce,","si","loin"] }
];
// ================================================================

// ── 이미지 풀 (hidden img 태그 참조) ──────────────────
var IMG_POOL = [
  document.getElementById("src-img-0"),
  document.getElementById("src-img-1"),
  document.getElementById("src-img-2")
];

// ── 퍼즐 설정 ──────────────────────────────────────────
var COLS = 2, ROWS = 3;
// 각 경계의 돌기 방향 (고정값, 인접 조각이 서로 맞물림)
// tabH[r][c]: row r 아래쪽 경계에서 col c 조각의 돌기 방향 (+1=아래돌출, -1=위돌출)
var tabH = [[1,-1],[-1,1]];
// tabV[r][c]: col c 오른쪽 경계에서 row r 조각의 돌기 방향 (+1=오른쪽, -1=왼쪽)
var tabV = [[1],[-1],[1]];

var pCanvas = document.getElementById("puzzle-canvas");
var pCtx    = pCanvas.getContext("2d");
var PW, PH, PW2, PH2;
var revealed = [false,false,false,false,false,false];
var puzzleImg = null;

function pickRandomImage() {
  return IMG_POOL[Math.floor(Math.random() * IMG_POOL.length)];
}

function initPuzzle(imgEl) {
  puzzleImg = imgEl;
  var maxW  = Math.min(320, window.innerWidth - 32);
  var ratio = imgEl.naturalHeight / imgEl.naturalWidth;
  PW = maxW;
  PH = Math.round(maxW * ratio);
  pCanvas.width  = PW;
  pCanvas.height = PH;
  PW2 = PW / COLS;
  PH2 = PH / ROWS;
  var dc = document.getElementById("done-canvas");
  dc.width = PW; dc.height = PH;
  drawPuzzle();
}

// 이미지 로드 완료 후 시작
var firstImg = pickRandomImage();
if (firstImg.complete && firstImg.naturalWidth > 0) {
  initPuzzle(firstImg);
} else {
  firstImg.onload = function() { initPuzzle(firstImg); };
}

// ── 퍼즐 조각 path ─────────────────────────────────────
function buildPath(ctx, col, row) {
  var x = col * PW2, y = row * PH2;
  var w = PW2, h = PH2;
  var t = Math.min(w, h) * 0.2;

  var topDir    = row > 0       ? -tabH[row-1][col] : 0;
  var bottomDir = row < ROWS-1  ?  tabH[row][col]   : 0;
  var leftDir   = col > 0       ? -tabV[row][col-1] : 0;
  var rightDir  = col < COLS-1  ?  tabV[row][col]   : 0;

  ctx.beginPath();
  // 상단
  ctx.moveTo(x, y);
  if (topDir !== 0) {
    ctx.lineTo(x+w/2-t*0.6, y);
    ctx.bezierCurveTo(x+w/2-t*0.6, y+topDir*t*1.2, x+w/2+t*0.6, y+topDir*t*1.2, x+w/2+t*0.6, y);
  }
  ctx.lineTo(x+w, y);
  // 우측
  if (rightDir !== 0) {
    ctx.lineTo(x+w, y+h/2-t*0.6);
    ctx.bezierCurveTo(x+w+rightDir*t*1.2, y+h/2-t*0.6, x+w+rightDir*t*1.2, y+h/2+t*0.6, x+w, y+h/2+t*0.6);
  }
  ctx.lineTo(x+w, y+h);
  // 하단
  if (bottomDir !== 0) {
    ctx.lineTo(x+w/2+t*0.6, y+h);
    ctx.bezierCurveTo(x+w/2+t*0.6, y+h+bottomDir*t*1.2, x+w/2-t*0.6, y+h+bottomDir*t*1.2, x+w/2-t*0.6, y+h);
  }
  ctx.lineTo(x, y+h);
  // 좌측
  if (leftDir !== 0) {
    ctx.lineTo(x, y+h/2+t*0.6);
    ctx.bezierCurveTo(x+leftDir*t*1.2, y+h/2+t*0.6, x+leftDir*t*1.2, y+h/2-t*0.6, x, y+h/2-t*0.6);
  }
  ctx.lineTo(x, y);
  ctx.closePath();
}

// ── 전체 퍼즐 그리기 ───────────────────────────────────
function drawPuzzle() {
  if (!puzzleImg) return;
  pCtx.clearRect(0, 0, PW, PH);
  for (var r = 0; r < ROWS; r++) {
    for (var c = 0; c < COLS; c++) {
      var idx = r * COLS + c;
      pCtx.save();
      buildPath(pCtx, c, r);
      pCtx.clip();
      pCtx.drawImage(puzzleImg, 0, 0, PW, PH);
      if (!revealed[idx]) {
        pCtx.fillStyle = "rgba(18,16,26,0.85)";
        pCtx.fillRect(0, 0, PW, PH);
      }
      pCtx.restore();
      // 경계선
      pCtx.save();
      buildPath(pCtx, c, r);
      pCtx.strokeStyle = revealed[idx] ? "rgba(196,151,90,0.3)" : "rgba(240,235,223,0.12)";
      pCtx.lineWidth = 1.5;
      pCtx.stroke();
      pCtx.restore();
    }
  }
}

// ── 조각 등장 애니메이션 ───────────────────────────────
function revealPiece(lineIdx) {
  var col = lineIdx % COLS;
  var row = Math.floor(lineIdx / COLS);
  revealed[lineIdx] = true;
  var start = null, dur = 600;
  function frame(ts) {
    if (!start) start = ts;
    var p = Math.min((ts - start) / dur, 1);
    // ease out cubic
    var e = 1 - Math.pow(1 - p, 3);
    pCtx.save();
    buildPath(pCtx, col, row);
    pCtx.clip();
    pCtx.drawImage(puzzleImg, 0, 0, PW, PH);
    if (e < 1) {
      pCtx.fillStyle = "rgba(18,16,26," + (0.85 * (1-e)) + ")";
      pCtx.fillRect(0, 0, PW, PH);
    }
    pCtx.restore();
    // 골드 테두리 글로우 효과
    pCtx.save();
    buildPath(pCtx, col, row);
    pCtx.strokeStyle = "rgba(196,151,90," + (e * 0.8) + ")";
    pCtx.lineWidth = 2;
    pCtx.stroke();
    pCtx.restore();
    if (p < 1) requestAnimationFrame(frame);
    else drawPuzzle();
  }
  requestAnimationFrame(frame);
}

// ── 게임 상태 ──────────────────────────────────────────
var curLine = 0, placed = [], srcWords = [], completed = {}, toastTimer = null;

renderTabs();
loadLine(0);
initParticles();

function renderTabs() {
  var el = document.getElementById("tabs");
  el.innerHTML = "";
  for (var i = 0; i < LINES.length; i++) {
    var btn = document.createElement("button");
    btn.className = "tab" + (i===curLine?" active":"") + (completed[i]?" done":"");
    btn.textContent = LINES[i].label + (completed[i]?" \u2713":"");
    btn.onclick = (function(idx){ return function(){ loadLine(idx); }; })(i);
    el.appendChild(btn);
  }
}

function loadLine(idx) {
  curLine = idx; placed = [];
  srcWords = shuffle(LINES[idx].words.slice());
  document.getElementById("line-title").textContent = LINES[idx].label + " — \uc21c\uc11c\ub300\ub85c \ubc30\uce58\ud558\uc138\uc694";
  renderTabs(); renderAnswer(); renderSource();
}

function renderAnswer() {
  var el = document.getElementById("answer-area");
  el.innerHTML = "";
  if (placed.length === 0) {
    el.innerHTML = "<span class='empty-hint'>\ub2e8\uc5b4\ub97c \ud0ed\ud558\uba74 \uc5ec\uae30\uc5d0 \uc313\uc5ec\uc694</span>";
    return;
  }
  for (var i = 0; i < placed.length; i++) {
    var s = document.createElement("div");
    s.className = "slot";
    s.innerHTML = "<span class='n'>"+(i+1)+".</span>"+placed[i];
    s.onclick = (function(idx){ return function(){ placed.splice(idx,1); renderAnswer(); renderSource(); }; })(i);
    el.appendChild(s);
  }
}

function renderSource() {
  var el = document.getElementById("source-area");
  el.innerHTML = "";
  var correct = LINES[curLine].words;
  var used = {};
  placed.forEach(function(w){ used[w]=(used[w]||0)+1; });
  srcWords.forEach(function(w) {
    var btn = document.createElement("button");
    btn.className = "word-btn";
    btn.textContent = w;
    var total = correct.filter(function(x){return x===w;}).length;
    if ((used[w]||0) >= total) btn.classList.add("used");
    btn.onclick = (function(word){ return function(){
      if (placed.length >= LINES[curLine].words.length) return;
      placed.push(word); renderAnswer(); renderSource(); spawnBurst();
    }; })(w);
    el.appendChild(btn);
  });
}

function onCheck() {
  var correct = LINES[curLine].words;
  if (placed.length === 0) { showToast("\ub2e8\uc5b4\ub97c \ud0ed\ud574\uc11c \ubc30\uce58\ud574\uc8fc\uc138\uc694"); return; }
  if (placed.length < correct.length) { showToast("\uc544\uc9c1 "+(correct.length-placed.length)+"\uac1c \ub354 \ud544\uc694\ud574\uc694"); return; }
  var isOk = placed.every(function(w,i){ return w===correct[i]; });
  var slots = document.querySelectorAll("#answer-area .slot");
  if (isOk) {
    slots.forEach(function(s,i){ setTimeout(function(){ s.classList.add("correct"); }, i*80); });
    completed[curLine] = true;
    updateProgress(); renderTabs(); spawnConfetti();
    showToast("\u2713 \uc815\ub2f5!");
    revealPiece(curLine);
    setTimeout(function() {
      if (Object.keys(completed).length >= LINES.length) { showDone(); return; }
      var next = curLine;
      for (var i=0;i<LINES.length;i++) { next=(next+1)%LINES.length; if(!completed[next]) break; }
      loadLine(next);
    }, 1500);
  } else {
    slots.forEach(function(s){ s.classList.add("wrong"); setTimeout(function(){s.classList.remove("wrong");},450); });
    for (var i=0;i<correct.length;i++) {
      if (placed[i]!==correct[i]) { showToast((i+1)+"\ubc88\uc9f8 \ub2e8\uc5b4\uac00 \ud2c0\ub838\uc5b4\uc694"); return; }
    }
    showToast("\uc21c\uc11c\uac00 \ub9de\uc9c0 \uc54a\uc544\uc694");
  }
}

function onReset() { placed=[]; renderAnswer(); renderSource(); }

function updateProgress() {
  var n=Object.keys(completed).length, pct=Math.round(n/LINES.length*100);
  document.getElementById("prog-pct").textContent=pct+"%";
  document.getElementById("prog-bar").style.width=pct+"%";
}

function showDone() {
  var dc=document.getElementById("done-canvas"),dCtx=dc.getContext("2d");
  dCtx.drawImage(puzzleImg,0,0,PW,PH);
  document.getElementById("screen-game").style.display="none";
  document.getElementById("screen-done").classList.add("visible");
  spawnBigConfetti();
}

function onReplay() {
  curLine=0;placed=[];srcWords=[];completed={};
  revealed=[false,false,false,false,false,false];
  document.getElementById("screen-game").style.display="";
  document.getElementById("screen-done").classList.remove("visible");
  document.getElementById("prog-pct").textContent="0%";
  document.getElementById("prog-bar").style.width="0%";
  var img=pickRandomImage();
  initPuzzle(img);
  renderTabs(); loadLine(0);
}

function showToast(msg) {
  var el=document.getElementById("toast");
  el.textContent=msg; el.classList.add("show");
  clearTimeout(toastTimer); toastTimer=setTimeout(function(){el.classList.remove("show");},2500);
}

function shuffle(arr) {
  for(var i=arr.length-1;i>0;i--){var j=0|Math.random()*(i+1);var t=arr[i];arr[i]=arr[j];arr[j]=t;}
  return arr;
}

// ── 파티클 ─────────────────────────────────────────────
var cv=document.getElementById("particle-canvas"),ctx=cv.getContext("2d"),W,H,pts=[];
function initParticles(){resizeCV();window.addEventListener("resize",resizeCV);for(var i=0;i<15;i++)addAmb();requestAnimationFrame(tick);}
function resizeCV(){W=cv.width=window.innerWidth;H=cv.height=window.innerHeight;}
function addAmb(){pts.push({x:Math.random()*W,y:Math.random()*H+H*.3,r:Math.random()*1.2+.3,vx:(Math.random()-.5)*.2,vy:-(Math.random()*.3+.08),a:Math.random()*.25+.05,c:["#c4975a","#d4849a","#5a4d7a"][0|Math.random()*3],amb:true,life:1});}
function spawnBurst(){var x=W/2,y=H*.6;for(var i=0;i<12;i++){var ag=Math.PI*2/12*i,sp=Math.random()*3+1;pts.push({x:x,y:y,r:Math.random()*3+1,vx:Math.cos(ag)*sp,vy:Math.sin(ag)*sp-1.5,a:1,c:["#c4975a","#d4849a","#f0ebdf"][0|Math.random()*3],amb:false,life:1,dc:.04});}}
function spawnConfetti(){for(var i=0;i<40;i++)pts.push({x:Math.random()*W,y:-10,r:Math.random()*4+2,vx:(Math.random()-.5)*6,vy:Math.random()*3+2,a:1,c:["#c4975a","#d4849a","#5a4d7a","#f0ebdf"][0|Math.random()*4],amb:false,life:1,dc:.012,rot:Math.random()*Math.PI*2,rs:(Math.random()-.5)*.18});}
function spawnBigConfetti(){for(var i=0;i<8;i++)setTimeout(spawnConfetti,i*200);}
function tick(){ctx.clearRect(0,0,W,H);pts=pts.filter(function(p){return p.life>.02;});pts.forEach(function(p){ctx.save();ctx.globalAlpha=p.amb?p.a:p.a*p.life;ctx.fillStyle=p.c;if(p.rot!==undefined){ctx.translate(p.x,p.y);ctx.rotate(p.rot);ctx.fillRect(-p.r,-p.r*.5,p.r*2,p.r);}else{ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();}ctx.restore();p.x+=p.vx;p.y+=p.vy;if(p.rot!==undefined)p.rot+=p.rs;if(!p.amb)p.life-=p.dc;if(p.amb){if(p.y<-20){p.y=H+20;p.x=Math.random()*W;}if(p.x<0)p.x=W;if(p.x>W)p.x=0;}});if(pts.filter(function(p){return p.amb;}).length<10)addAmb();requestAnimationFrame(tick);}
</script>
</body>
</html>
